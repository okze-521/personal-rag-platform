<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal RAG Platform</title>
    <style>
        :root { --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --radius: 8px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; }
        header { padding: 16px 20px; border-bottom: 1px solid var(--border);
            background: var(--surface); display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.1em; }
        header .badge { font-size: 0.7em; padding: 2px 8px; border-radius: 4px; background: var(--green); color: #000; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { padding: 12px 16px; border-radius: var(--radius); max-width: 90%; line-height: 1.6; }
        .msg.user { background: #1f6feb22; align-self: flex-end; border: 1px solid #1f6feb44; }
        .msg.bot { background: var(--surface); align-self: flex-start; border: 1px solid var(--border); }
        .msg .meta { font-size: 0.7em; color: var(--muted); margin-bottom: 6px; }
        .msg .snippets { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
            font-size: 0.8em; color: var(--muted); }
        footer { padding: 12px 20px; border-top: 1px solid var(--border);
            background: var(--surface); display: flex; gap: 8px; }
        footer input { flex: 1; padding: 10px 14px; background: var(--bg);
            border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); outline: none; }
        footer input:focus { border-color: var(--accent); }
        footer button { padding: 10px 20px; background: var(--accent); color: #000;
            border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer; }
        footer button:disabled { opacity: 0.5; cursor: not-allowed; }
        pre { background: #00000033; border-radius: 4px; padding: 8px; overflow-x: auto; margin: 6px 0; }
    </style>
</head>
<body>
    <header>
        <h1>📚 Personal RAG Platform</h1>
        <span class="badge">v2.0</span>
    </header>
    <div id="chat">
        <div class="msg bot">
            <div class="meta">🤖 助手</div>
            你好！我是基于私有知识库的 AI 助手。试试问「什么是存算分离架构？」
        </div>
    </div>
    <footer>
        <input id="q" type="text" placeholder="输入问题..." onkeydown="if(event.key==='Enter')send()">
        <button id="btn" onclick="send()">发送</button>
    </footer>
    <script>
        async function send() {
            const input = document.getElementById('q'), btn = document.getElementById('btn'),
                  chat = document.getElementById('chat');
            const query = input.value.trim();
            if (!query) return;
            const msg = d('div', 'msg user', '<div class="meta">👤 你</div>' + esc(query));
            chat.appendChild(msg);
            input.value = ''; btn.disabled = true;
            const loading = d('div', 'msg bot', '⏳ 检索中... Embed → Search → Rerank → LLM');
            chat.appendChild(loading); chat.scrollTop = chat.scrollHeight;
            try {
                const resp = await fetch('/api/v1/query', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: query, top_k: 3})
                });
                const data = await resp.json();
                loading.remove();
                let html = '<div class="meta">🤖 助手</div>' + fmt(data.generated_response || '无响应');
                if (data.context_snippets && data.context_snippets.length) {
                    html += '<div class="snippets">📎 参考来源：';
                    data.context_snippets.forEach((s,i) => html += `<div>[${i+1}] ${esc(s.substring(0,120))}...</div>`);
                    html += '</div>';
                }
                chat.appendChild(d('div', 'msg bot', html));
            } catch(e) { loading.innerHTML = '❌ 请求失败: ' + e.message; }
            btn.disabled = false; chat.scrollTop = chat.scrollHeight;
        }
        function d(tag, cls, html) { const e = document.createElement(tag); e.className = cls; e.innerHTML = html; return e; }
        function fmt(t) { return esc(t).replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre>$2</pre>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>
