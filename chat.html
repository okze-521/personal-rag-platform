<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal RAG Platform — 知识库问答</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ── Header ── */
  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #f0f0f0;
  }
  header .subtitle {
    font-size: 12px;
    color: #888;
    margin-left: 12px;
  }
  .status {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status.online { background: #0d2818; color: #4ade80; }
  .status.offline { background: #2d1215; color: #f87171; }
  .status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .status.online .dot { background: #4ade80; }
  .status.offline .dot { background: #f87171; }
  /* ── Chat Area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 85%;
    display: flex;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg.user .avatar { background: #1e3a5f; }
  .msg.ai .avatar    { background: #1a2d1a; }
  .msg .content {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .content {
    background: #1a3a6b;
    border-bottom-right-radius: 4px;
  }
  .msg.ai .content {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-bottom-left-radius: 4px;
  }
  .sources {
    margin-top: 10px;
    font-size: 12px;
    color: #888;
    border-top: 1px solid #2a2a2a;
    padding-top: 8px;
  }
  .sources summary {
    cursor: pointer;
    color: #6b8ab5;
  }
  .sources summary:hover { color: #8ab4f8; }
  .sources ul {
    margin-top: 6px;
    padding-left: 16px;
  }
  .sources li {
    margin-bottom: 4px;
    color: #777;
  }
  .sources li span { color: #aaa; }
  .loading {
    display: inline-flex;
    gap: 4px;
    padding: 8px 0;
  }
  .loading span {
    width: 6px; height: 6px;
    background: #555;
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
  /* ── Input Area ── */
  #input-area {
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    padding: 16px 24px;
    flex-shrink: 0;
  }
  #input-area form {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
  }
  #input-area input {
    flex: 1;
    padding: 12px 16px;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input-area input:focus { border-color: #4ade80; }
  #input-area button {
    padding: 12px 20px;
    background: #4ade80;
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  #input-area button:hover { background: #22c55e; }
  #input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }
  /* ── Empty State ── */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #555;
    gap: 8px;
  }
  .empty .icon { font-size: 48px; }
  .empty p { font-size: 14px; }
  .quick-qs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 12px;
  }
  .quick-qs button {
    padding: 8px 16px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 20px;
    color: #aaa;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-qs button:hover { border-color: #4ade80; color: #4ade80; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <h1>🧠 Personal RAG Platform</h1>
    <span class="subtitle">存算分离 · 私有化知识库问答</span>
  </div>
  <div class="status" id="status">
    <span class="dot"></span>
    <span id="status-text">检测中...</span>
  </div>
</header>

<div id="chat">
  <div class="empty" id="empty-state">
    <div class="icon">📚</div>
    <p>向你的私有知识库提问</p>
    <div class="quick-qs">
      <button onclick="sendQuick('什么是RAG？')">什么是RAG？</button>
      <button onclick="sendQuick('存算分离架构怎么运作的？')">存算分离架构？</button>
      <button onclick="sendQuick('BGE-M3 有什么特点？')">BGE-M3 特点？</button>
      <button onclick="sendQuick('如何部署Qdrant？')">如何部署Qdrant？</button>
    </div>
  </div>
</div>

<div id="input-area">
  <form id="query-form" onsubmit="sendMessage(event)">
    <input 
      type="text" 
      id="query-input" 
      placeholder="输入你的问题..."
      autocomplete="off"
      autofocus
    >
    <button type="submit" id="send-btn">发送</button>
  </form>
</div>

<script>
const API_BASE = 'http://127.0.0.1:8099';
const chat = document.getElementById('chat');
const emptyState = document.getElementById('empty-state');
const input = document.getElementById('query-input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('status-text');
let isLoading = false;

// ── Health Check ──
async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      statusEl.className = 'status online';
      statusText.textContent = '台式机 MoE 在线';
    }
  } catch {
    statusEl.className = 'status offline';
    statusText.textContent = '服务未连接';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ── Send Message ──
async function sendMessage(e) {
  e.preventDefault();
  const query = input.value.trim();
  if (!query || isLoading) return;
  addUserMessage(query);
  hideEmpty();
  input.value = '';
  setLoading(true);

  try {
    const r = await fetch(`${API_BASE}/api/v1/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, top_k: 5 })
    });
    const d = await r.json();
    addAIMessage(d.generated_response, d.context_snippets || []);
  } catch (err) {
    addAIMessage('⚠️ 请求失败：' + err.message, []);
  }
  setLoading(false);
}

function sendQuick(q) {
  input.value = q;
  sendMessage(new Event('submit', { cancelable: true }));
}

// ── UI Helpers ──
function hideEmpty() {
  if (emptyState) emptyState.style.display = 'none';
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar">👤</div><div class="content">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  scrollDown();
}

function addAIMessage(text, sources) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  let html = `<div class="avatar">🤖</div><div class="content">${escapeHtml(text)}`;
  
  if (sources && sources.length > 0) {
    html += '<details class="sources"><summary>📎 参考来源 (' + sources.length + ')</summary><ul>';
    sources.forEach(s => {
      html += '<li><span>' + escapeHtml(s.substring(0, 200)) + '</span></li>';
    });
    html += '</ul></details>';
  }
  
  html += '</div>';
  div.innerHTML = html;
  
  // Remove loading placeholder if exists
  const loader = chat.querySelector('.msg.ai.loading-msg');
  if (loader) loader.remove();
  
  chat.appendChild(div);
  scrollDown();
}

function setLoading(loading) {
  isLoading = loading;
  sendBtn.disabled = loading;
  input.disabled = loading;
  if (loading) {
    const div = document.createElement('div');
    div.className = 'msg ai loading-msg';
    div.innerHTML = '<div class="avatar">🤖</div><div class="content"><div class="loading"><span></span><span></span><span></span></div></div>';
    chat.appendChild(div);
    scrollDown();
  }
}

function scrollDown() {
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>

</body>
</html>
